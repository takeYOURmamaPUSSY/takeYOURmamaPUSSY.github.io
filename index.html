<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>附近炮友</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
      font-size: 2rem;
    }
    #content {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .progress-container {
      width: 100%;
      max-width: 500px;
      height: 20px;
      background: #e0e0e0;
      border-radius: 10px;
      margin-top: 20px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: #4caf50;
      border-radius: 10px;
      transition: width 1.1s ease;
    }
    #image {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      justify-content: center;
      align-items: center;
    }
    #image.show {
      display: flex;
    }
    #image img {
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      transition: transform 0.06s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
  </style>
</head>
<body>
  <div id="content">
    <span>正在为您寻找附近炮友,当前进度<span id="percent">0</span>%</span>
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>
  <div id="image">
    <img src="horro.jpg" alt="horror">
  </div>
  <script>
    const el = document.getElementById('percent');
    const bar = document.getElementById('progressBar');
    const content = document.getElementById('content');
    const image = document.getElementById('image');
    let value = 0;
    const interval = setInterval(() => {
      value++;
      el.textContent = value;
      bar.style.width = value + '%';
      if (value >= 100) clearInterval(interval);
      if (value === 6) {
        clearInterval(interval);
        content.style.display = 'none';
        const img = image.querySelector('img');
        img.style.transform = 'scale(0)';
        image.classList.add('show');
        let bg = false;
        setInterval(() => {
          image.style.background = bg ? '#f00' : '#00f';
          bg = !bg;
        }, 50);
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            img.style.transform = 'scale(1)';
          });
        });
      }
    }, 1200);
  </script>
</body>
</html>
